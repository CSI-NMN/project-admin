spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/churchdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: warn

app:
  odata:
    default-top: 25
    max-top: 200

